name: Mobile App Test Automation (Appium)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch: {}

jobs:
  android-appium-tests:
    name: Run Appium tests on Android emulator
    # GitHub-hosted Ubuntu runners now support hardware-accelerated Android
    # emulation (with KVM enabled below) and are the officially recommended
    # runner for this action -- 2-3x faster and more reliable than macOS
    # runners, which is what earlier revisions of this workflow used and
    # which repeatedly hit "Timeout waiting for emulator to boot."
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Set up Node.js (for Appium)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Appium and the UiAutomator2 driver
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Download the demo app APK
        run: |
          mkdir -p app
          # appium/android-apidemos is Appium's own official sample app
          # (used in Appium's own test suite), released as a stable
          # "ApiDemos-debug.apk" asset. Pinned to a specific release tag
          # (not the "latest" alias) so this build is reproducible and a
          # future release can't silently change what's under test --
          # curl -fL still fails loudly instead of saving an HTML error
          # page if this URL ever breaks (see git history for why that
          # matters: a previous app's "latest" alias 404'd and silently
          # downloaded an HTML page in its place, which looked like every
          # single test failing instantly).
          curl -fL -o app/ApiDemos-debug.apk \
            https://github.com/appium/android-apidemos/releases/download/v6.0.10/ApiDemos-debug.apk

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-30-google_apis-x86_64

      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: pixel_5
          force-avd-creation: false
          emulator-boot-timeout: 900
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          disable-spellchecker: true
          script: echo "Generated AVD snapshot for caching."

      - name: Run tests on Android emulator
        # Step-level timeout so that if the emulator-runner action's own
        # teardown hangs after tests finish (observed once: pytest completed
        # in ~3 minutes but the step then sat idle for ~14 minutes until the
        # job-level timeout killed the whole run and marked it "Cancelled",
        # burying the real "13 failed" test result), this step fails fast
        # and reports its own status instead of masking it.
        timeout-minutes: 10
        uses: reactivecircus/android-emulator-runner@v2
        env:
          # api-level 30 (below) boots as Android 11 -- conftest.py's driver
          # fixture defaults to requesting platform_version "13" if
          # PLATFORM_VERSION isn't set, which caused Appium to fail with
          # "Unable to find an active device or emulator with OS 13" even
          # though the emulator was up and healthy. Setting this as a
          # step-level env var (rather than `export`-ing it inside the
          # script) guarantees it reaches the pytest process no matter how
          # this action internally executes the script.
          PLATFORM_VERSION: "11"
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: pixel_5
          force-avd-creation: false
          emulator-boot-timeout: 900
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          disable-spellchecker: true
          script: |
            appium --log-timestamp --log appium.log &
            APPIUM_PID=$!
            # Give the Appium server a moment to come up before tests connect
            sleep 10
            echo "Using PLATFORM_VERSION=$PLATFORM_VERSION"
            pytest tests -m mobile -v --html=mobile-report.html --self-contained-html
            PYTEST_EXIT=$?
            # `|| true`: a run showed this action doesn't reliably carry
            # shell state (like a `$!`-captured PID) across this script
            # block the same way a normal single shell session would --
            # $APPIUM_PID came back empty, so `kill` ran with no argument,
            # printed its usage message, and exited 2, which failed this
            # whole step even though every pytest test had just passed.
            # Cleaning up the background Appium server is best-effort
            # housekeeping, not part of the test result, so it must never
            # be able to fail the step on its own -- exit with pytest's
            # actual exit code instead, which is what should determine
            # pass/fail here.
            kill "$APPIUM_PID" 2>/dev/null || true
            exit $PYTEST_EXIT

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-test-report
          path: mobile-report.html

      - name: Upload Appium server log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-log
          path: appium.log
