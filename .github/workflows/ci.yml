name: Mobile App Test Automation (Appium)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch: {}

jobs:
  android-appium-tests:
    name: Run Appium tests on Android emulator
    # GitHub-hosted Ubuntu runners now support hardware-accelerated Android
    # emulation (with KVM enabled below) and are the officially recommended
    # runner for this action -- 2-3x faster and more reliable than macOS
    # runners, which is what earlier revisions of this workflow used and
    # which repeatedly hit "Timeout waiting for emulator to boot."
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Set up Node.js (for Appium)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Appium and the UiAutomator2 driver
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Download the demo app APK
        run: |
          mkdir -p app
          # NOTE: the "latest"-alias download URL for this asset (MyDemoAppRN.apk)
          # returns a 404 -- the release's real asset is named differently
          # (Android-MyDemoAppRN.1.3.0.build-244.apk). curl -f makes this fail
          # loudly on any future breakage instead of silently saving an HTML
          # "Not Found" page as if it were the APK (which is what caused every
          # test to fail instantly in a previous run).
          curl -fL -o app/MyDemoAppRN.apk \
            https://github.com/saucelabs/my-demo-app-rn/releases/download/v1.3.0/Android-MyDemoAppRN.1.3.0.build-244.apk

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-30-google_apis-x86_64

      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: pixel_5
          force-avd-creation: false
          emulator-boot-timeout: 900
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          disable-spellchecker: true
          script: echo "Generated AVD snapshot for caching."

      - name: Run tests on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: pixel_5
          force-avd-creation: false
          emulator-boot-timeout: 900
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          disable-spellchecker: true
          script: |
            # api-level 30 (set above) boots as Android 11 -- conftest.py's
            # driver fixture defaults to requesting platform_version "13" if
            # PLATFORM_VERSION isn't set, which caused Appium to fail with
            # "Unable to find an active device or emulator with OS 13" even
            # though the emulator was up and running fine. Pin this to match
            # the actual booted OS version.
            export PLATFORM_VERSION=11
            appium --log-timestamp --log appium.log &
            APPIUM_PID=$!
            # Give the Appium server a moment to come up before tests connect
            sleep 10
            pytest tests -m mobile -v --html=mobile-report.html --self-contained-html
            kill $APPIUM_PID

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-test-report
          path: mobile-report.html

      - name: Upload Appium server log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-log
          path: appium.log
