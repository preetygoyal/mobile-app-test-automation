name: Mobile App Test Automation (Appium)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch: {}

jobs:
  android-appium-tests:
    name: Run Appium tests on Android emulator
    # GitHub-hosted Ubuntu runners now support hardware-accelerated Android
    # emulation (with KVM enabled below) and are the officially recommended
    # runner for this action -- 2-3x faster and more reliable than macOS
    # runners, which is what earlier revisions of this workflow used and
    # which repeatedly hit "Timeout waiting for emulator to boot."
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Set up Node.js (for Appium)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Appium and the UiAutomator2 driver
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Download the demo app APK
        run: |
          mkdir -p app
          # appium/android-apidemos is Appium's own official sample app
          # (used in Appium's own test suite), released as a stable
          # "ApiDemos-debug.apk" asset. Pinned to a specific release tag
          # (not the "latest" alias) so this build is reproducible and a
          # future release can't silently change what's under test --
          # curl -fL still fails loudly instead of saving an HTML error
          # page if this URL ever breaks (see git history for why that
          # matters: a previous app's "latest" alias 404'd and silently
          # downloaded an HTML page in its place, which looked like every
          # single test failing instantly).
          curl -fL -o app/ApiDemos-debug.apk \
            https://github.com/appium/android-apidemos/releases/download/v6.0.10/ApiDemos-debug.apk

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-30-google_apis-x86_64

      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: pixel_5
          force-avd-creation: false
          emulator-boot-timeout: 900
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          disable-spellchecker: true
          script: echo "Generated AVD snapshot for caching."

      - name: Run tests on Android emulator
        id: run_tests
        # continue-on-error: this action's own post-script "Terminate
        # Emulator" teardown has repeatedly hung for minutes *after*
        # pytest already finished and this step's script already exited
        # cleanly (confirmed across several runs: "6 passed", script exits
        # 0, then a hang in the action's own cleanup code, unrelated to
        # ANDROID_EMULATOR_WAIT_TIME_BEFORE_KILL below). Letting that hang
        # (or the timeout that bounds it) fail this step is fine -- it's
        # genuinely informative -- but it must not fail the *job*, since
        # the actual test result was already decided and written to
        # pytest_exit_code.txt before the hang-prone teardown even starts.
        # The "Fail the job if pytest actually failed" step below is the
        # real source of truth for pass/fail.
        continue-on-error: true
        # 6 minutes, not 10: with the current suite, a healthy run's pytest
        # output appears within ~2 minutes of this step starting, so 6
        # minutes is still a generous 3x buffer while failing faster than
        # before when the known teardown hang below happens.
        timeout-minutes: 6
        uses: reactivecircus/android-emulator-runner@v2
        env:
          # api-level 30 (below) boots as Android 11 -- conftest.py's driver
          # fixture defaults to requesting platform_version "13" if
          # PLATFORM_VERSION isn't set, which caused Appium to fail with
          # "Unable to find an active device or emulator with OS 13" even
          # though the emulator was up and healthy. Setting this as a
          # step-level env var (rather than `export`-ing it inside the
          # script) guarantees it reaches the pytest process no matter how
          # this action internally executes the script.
          PLATFORM_VERSION: "11"
          # A run showed pytest finish cleanly ("6 passed") and this
          # step's own script exit 0, then the emulator-runner action's
          # own "Terminate Emulator" logic hang for 8+ minutes right after
          # logging "Wait for emulator ... 20 seconds to shutdown
          # gracefully before kill" -- far longer than the 20s the log
          # message itself implies. The action's log message names this
          # env var as the way to tune that wait; set it low so the
          # graceful-shutdown phase can't itself be the long pole, even
          # though the deeper hang may be elsewhere in the action.
          ANDROID_EMULATOR_WAIT_TIME_BEFORE_KILL: "5"
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: pixel_5
          force-avd-creation: false
          emulator-boot-timeout: 900
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          disable-spellchecker: true
          # IMPORTANT: this action runs *each line* of `script:` as its own
          # separate `sh -c` process (confirmed directly in a run's log:
          # "[command]/usr/bin/sh -c PYTEST_EXIT=$?" and
          # "[command]/usr/bin/sh -c echo \"$PYTEST_EXIT\" > ..." appeared
          # as two distinct invocations) -- not one continuous shell
          # session. Shell variables set on one line (`X=...`) are
          # completely gone by the next line, full stop. That's the same
          # underlying reason PLATFORM_VERSION had to be a step-level env
          # var earlier in this file rather than `export`-ed, and it's
          # why $APPIUM_PID and then $PYTEST_EXIT both came back empty
          # when read on a later line. The fix is the same both times:
          # never split a "capture a value" step from its "use the value"
          # step across two lines -- keep them on one line (one `;`
          # separated command = one `sh -c` invocation), or persist the
          # value to a file instead of a shell variable.
          script: |
            appium --log-timestamp --log appium.log &
            # Give the Appium server a moment to come up before tests connect
            sleep 10
            echo "Using PLATFORM_VERSION=$PLATFORM_VERSION"
            pytest tests -m mobile -v --html=mobile-report.html --self-contained-html; echo $? > pytest_exit_code.txt
            pkill -f "node .*appium" 2>/dev/null || true
            exit $(cat pytest_exit_code.txt)

      - name: Fail the job if pytest actually failed
        # This step -- not "Run tests on Android emulator" above -- is the
        # real source of truth for the job's pass/fail. That step is
        # allowed to report its own failure (continue-on-error: true) when
        # the action's teardown hangs/times out *after* tests already
        # passed, so a known-flaky third-party cleanup routine can't turn
        # a genuinely green test run into a red one. This step reads the
        # actual pytest exit code captured just before that teardown phase
        # and is what actually gates the job.
        if: always()
        run: |
          if [ -f pytest_exit_code.txt ]; then
            code=$(cat pytest_exit_code.txt)
            echo "pytest exited with code $code"
            exit "$code"
          else
            echo "pytest_exit_code.txt not found -- the test step didn't get far enough to run pytest at all (see its own logs above)"
            exit 1
          fi

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-test-report
          path: mobile-report.html

      - name: Upload Appium server log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-log
          path: appium.log
